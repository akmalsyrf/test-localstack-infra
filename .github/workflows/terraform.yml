name: Terraform LocalStack

# Architecture:
#   Git push → GitHub Actions → LocalStack (Docker) + Terraform CLI
#                            → Terraform Cloud (remote state only, execution_mode=local)
#                            → LocalStack APIs (localhost:4566, not exposed publicly)

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        type: choice
        options:
          - dev
          - staging
        default: staging
      action:
        description: Terraform action
        required: true
        type: choice
        options:
          - plan
          - apply
          - destroy
        default: plan

concurrency:
  group: terraform-localstack-${{ github.event.inputs.environment || 'staging' }}-${{ github.ref }}
  cancel-in-progress: false

env:
  TF_TOKEN_app_terraform_io: ${{ secrets.TF_TOKEN_app_terraform_io }}
  AWS_ACCESS_KEY_ID: test
  AWS_SECRET_ACCESS_KEY: test
  AWS_DEFAULT_REGION: ap-southeast-3
  TFC_ORG: ExperimentTerraform
  BACKEND: cloud

jobs:
  terraform:
    name: Terraform (${{ github.event.inputs.environment || 'staging' }})
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Require Terraform Cloud token
        run: |
          if [ -z "${TF_TOKEN_app_terraform_io}" ]; then
            echo "::error::Add repository secret TF_TOKEN_app_terraform_io (TFC user/team token)."
            exit 1
          fi

      - name: Start LocalStack
        run: |
          docker compose up -d --wait
          curl -sf http://localhost:4566/_localstack/health | tee /tmp/ls-health.json
          echo
          echo "LocalStack is healthy (bound to job network only; not published to the internet)."

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.5.7"
          terraform_wrapper: false

      - name: Sync live stacks (TFC cloud backend)
        run: |
          chmod +x scripts/*.sh
          ./scripts/sync-live.sh
          ./scripts/ensure-tfc-local-execution.sh
          ./scripts/assert-tfc-local-execution.sh

      - name: Package Lambda
        run: |
          mkdir -p lambda/api
          (cd lambda/api && zip -q -j function.zip handler.py)

      - name: Resolve environment & action
        id: meta
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "environment=${{ github.event.inputs.environment }}" >> "$GITHUB_OUTPUT"
            echo "action=${{ github.event.inputs.action }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "environment=staging" >> "$GITHUB_OUTPUT"
            echo "action=plan" >> "$GITHUB_OUTPUT"
          else
            # push to main → plan+apply staging by default
            echo "environment=staging" >> "$GITHUB_OUTPUT"
            echo "action=apply" >> "$GITHUB_OUTPUT"
          fi

      - name: Terraform init / plan / apply
        env:
          ENVIRONMENT: ${{ steps.meta.outputs.environment }}
          ACTION: ${{ steps.meta.outputs.action }}
        run: |
          set -euo pipefail
          LIVE="terraform/live/${ENVIRONMENT}"
          STACKS=(shared network backend)

          run_one() {
            local stack="$1"
            local dir="${LIVE}/${stack}"
            echo "::group::${ACTION} ${ENVIRONMENT}/${stack}"
            # -reconfigure picks up workspace execution-mode changes (remote → local)
            terraform -chdir="$dir" init -input=false -reconfigure
            case "$ACTION" in
              plan)
                terraform -chdir="$dir" plan -input=false -no-color
                ;;
              apply)
                terraform -chdir="$dir" apply -auto-approve -input=false -no-color
                ;;
              destroy)
                terraform -chdir="$dir" destroy -auto-approve -input=false -no-color
                ;;
              *)
                echo "Unknown action: $ACTION" >&2
                exit 1
                ;;
            esac
            echo "::endgroup::"
          }

          if [ "$ACTION" = "destroy" ]; then
            for ((i=${#STACKS[@]}-1; i>=0; i--)); do
              run_one "${STACKS[$i]}"
            done
          else
            for stack in "${STACKS[@]}"; do
              run_one "$stack"
            done
          fi

          if [ "$ACTION" = "apply" ]; then
            echo "::group::Outputs"
            terraform -chdir="${LIVE}/backend" output -no-color || true
            echo "::endgroup::"
          fi

      - name: Verify apply (resources + functional)
        if: steps.meta.outputs.action == 'apply'
        run: |
          chmod +x scripts/*.sh
          ./scripts/verify-apply.sh "${{ steps.meta.outputs.environment }}"

      - name: Stop LocalStack
        if: always()
        run: docker compose down -v
