name: Terraform LocalStack

# CI sequencing (avoids Kind+LocalStack Docker/CPU contention on small runners):
#   1) LocalStack alone + latency smoke
#   2) Terraform shared → network → backend  (no Kind)
#   3) Kind (+ metrics-server) + latency smoke again
#   4) Terraform eks + verify-apply
# Local `./scripts/up.sh` still starts Kind then LocalStack for one-command DX.

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        type: choice
        options:
          - dev
          - staging
          - production
        default: staging
      action:
        description: Terraform action
        required: true
        type: choice
        options:
          - plan
          - apply
          - destroy
        default: plan

concurrency:
  group: terraform-localstack-${{ github.event.inputs.environment || 'staging' }}-${{ github.ref }}
  cancel-in-progress: false

env:
  TF_TOKEN_app_terraform_io: ${{ secrets.TF_TOKEN_app_terraform_io }}
  AWS_ACCESS_KEY_ID: test
  AWS_SECRET_ACCESS_KEY: test
  AWS_DEFAULT_REGION: ap-southeast-3
  AWS_EC2_METADATA_DISABLED: "true"
  TFC_ORG: ExperimentTerraform
  BACKEND: local
  # Lambda invoke smoke tests need the docker executor; Kind is deferred (below)
  # so both are not contending during shared/network/backend.
  LAMBDA_RUNTIME_EXECUTOR: docker

jobs:
  static-analysis:
    name: Static analysis (tflint + checkov)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.5.7"
          terraform_wrapper: false

      - name: Sync live stacks (local backend)
        run: |
          chmod +x scripts/*.sh
          BACKEND=local ./scripts/sync-live.sh

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: v0.50.3

      - name: TFLint
        run: |
          tflint --init
          failed=0
          for dir in terraform/modules/*; do
            [ -d "$dir" ] || continue
            # Docs-only snippet directory (no real Terraform root module)
            [ "$(basename "$dir")" = "_provider" ] && continue
            echo "==> tflint $dir"
            if ! tflint --chdir="$dir" --format compact --config "$PWD/.tflint.hcl"; then
              failed=1
            fi
          done
          # Live stacks are generated; report but do not fail the job on unused shared vars noise
          for dir in terraform/live/staging/*; do
            [ -d "$dir" ] || continue
            echo "==> tflint $dir (informational)"
            tflint --chdir="$dir" --format compact --config "$PWD/.tflint.hcl" || true
          done
          exit "$failed"

      - name: Checkov
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: terraform/modules
          framework: terraform
          soft_fail: true
          skip_check: CKV_AWS_144,CKV_AWS_18,CKV_AWS_21,CKV2_AWS_6,CKV_AWS_145,CKV_AWS_19,CKV_AWS_26,CKV_AWS_27,CKV_AWS_7

  terraform:
    name: Terraform (${{ github.event.inputs.environment || 'staging' }})
    needs: static-analysis
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Require TFC token when BACKEND=cloud
        run: |
          if [ "${BACKEND}" = "cloud" ] && [ -z "${TF_TOKEN_app_terraform_io}" ]; then
            echo "::error::BACKEND=cloud requires repository secret TF_TOKEN_app_terraform_io."
            exit 1
          fi

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: "v1.29.14"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.5.7"
          terraform_wrapper: false

      - name: Resolve environment & action
        id: meta
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "environment=${{ github.event.inputs.environment }}" >> "$GITHUB_OUTPUT"
            echo "action=${{ github.event.inputs.action }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "environment=staging" >> "$GITHUB_OUTPUT"
            echo "action=plan" >> "$GITHUB_OUTPUT"
          else
            echo "environment=staging" >> "$GITHUB_OUTPUT"
            echo "action=apply" >> "$GITHUB_OUTPUT"
          fi

      - name: Start LocalStack (no Kind yet)
        timeout-minutes: 5
        run: |
          chmod +x scripts/*.sh
          # Kind-independent stacks must not share the runner with a 3-node Kind cluster.
          SKIP_KIND=1 ./scripts/up.sh
          curl -sf http://localhost:4566/_localstack/health | tee /tmp/ls-health.json
          echo
          echo "LocalStack is healthy (Kind deferred until eks stage)."

      - name: LocalStack latency smoke (pre-Kind)
        timeout-minutes: 2
        run: ./scripts/check-localstack-latency.sh 5

      - name: Terraform ${{ steps.meta.outputs.action }} (shared,network,backend)
        if: steps.meta.outputs.action != 'destroy'
        timeout-minutes: 20
        run: |
          chmod +x scripts/*.sh
          ./scripts/env.sh "${{ steps.meta.outputs.environment }}" "${{ steps.meta.outputs.action }}" shared,network,backend

      - name: Start Kind (before eks only)
        timeout-minutes: 15
        run: |
          chmod +x scripts/*.sh
          ./scripts/kind-up.sh

          # Kind create can briefly starve LocalStack. Wait/recover WITHOUT
          # docker network connect or compose restart (connect breaks host :4566
          # on Linux CI; restart wipes PERSISTENCE=0 state after early applies).
          # Kind→LocalStack uses host.docker.internal (see localstack-network-info.sh).
          if ! curl -sf --max-time 3 http://localhost:4566/_localstack/health >/dev/null; then
            echo "LocalStack unreachable after Kind create — docker compose up -d (no recreate)..."
            docker compose up -d --no-recreate
          fi
          for i in $(seq 1 60); do
            if curl -sf --max-time 3 http://localhost:4566/_localstack/health >/dev/null; then
              echo "LocalStack healthy (host :4566)."
              break
            fi
            if [[ "$i" -eq 60 ]]; then
              echo "::error::LocalStack did not recover after Kind start"
              docker compose ps || true
              docker compose logs --tail=80 || true
              exit 1
            fi
            sleep 2
          done

          kind get clusters
          kubectl --kubeconfig .kube/kind-config get nodes

      - name: LocalStack latency smoke (post-Kind)
        timeout-minutes: 2
        run: ./scripts/check-localstack-latency.sh 5

      - name: Terraform ${{ steps.meta.outputs.action }} (eks)
        if: steps.meta.outputs.action != 'destroy'
        timeout-minutes: 25
        run: |
          chmod +x scripts/*.sh
          ./scripts/env.sh "${{ steps.meta.outputs.environment }}" "${{ steps.meta.outputs.action }}" eks

      - name: Verify apply
        if: steps.meta.outputs.action == 'apply'
        timeout-minutes: 15
        run: ./scripts/verify-apply.sh "${{ steps.meta.outputs.environment }}"

      # Destroy needs Kind for eks first, then Kind-independent stacks (env.sh reverses order).
      - name: Terraform destroy (eks → backend → network → shared)
        if: steps.meta.outputs.action == 'destroy'
        timeout-minutes: 30
        run: |
          chmod +x scripts/*.sh
          ./scripts/env.sh "${{ steps.meta.outputs.environment }}" destroy

      - name: Diagnostics (on failure)
        if: failure()
        timeout-minutes: 5
        run: |
          echo "==> LocalStack health (localhost)"
          curl -sf --max-time 3 http://localhost:4566/_localstack/health || echo "(localhost failed)"
          echo
          LS_IP="$(docker inspect -f '{{range $n,$c := .NetworkSettings.Networks}}{{if ne $n "kind"}}{{println $c.IPAddress}}{{end}}{{end}}' testinfra-localstack 2>/dev/null | awk 'NF{print; exit}')"
          echo "==> LocalStack health (container IP ${LS_IP:-none})"
          if [ -n "$LS_IP" ]; then
            curl -sf --max-time 3 "http://${LS_IP}:4566/_localstack/health" || echo "(container IP failed)"
          fi
          echo
          echo "==> LOCALSTACK_ENDPOINT=${LOCALSTACK_ENDPOINT:-unset}"
          echo "==> Docker stats (top)"
          docker stats --no-stream || true
          echo "==> LocalStack logs (tail)"
          docker compose logs --tail=120 || true
          echo "==> Kind nodes (if any)"
          kind get clusters || true
          kubectl --kubeconfig .kube/kind-config get nodes -o wide 2>/dev/null || true
          kubectl --kubeconfig .kube/kind-config get pods -A 2>/dev/null || true

      - name: Stop Kind + LocalStack
        if: always()
        timeout-minutes: 5
        run: |
          docker compose down -v || true
          # No-op safe if Kind never started (failed before eks stage).
          ./scripts/kind-down.sh || true
