name: Terraform LocalStack

# Architecture:
#   Git push → GitHub Actions → Kind + LocalStack (Docker) + Terraform CLI
#                            → local terraform.tfstate (default; reliable with LocalStack)
#                            → optional S3+DynamoDB on LocalStack (BACKEND=s3)
#                            → optional Terraform Cloud (set BACKEND=cloud + secret; execution_mode=local)
#                            → LocalStack APIs (localhost:4566) + Kind (EKS_K8S_PROVIDER=local)

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        type: choice
        options:
          - dev
          - staging
        default: staging
      action:
        description: Terraform action
        required: true
        type: choice
        options:
          - plan
          - apply
          - destroy
        default: plan

concurrency:
  group: terraform-localstack-${{ github.event.inputs.environment || 'staging' }}-${{ github.ref }}
  cancel-in-progress: false

env:
  TF_TOKEN_app_terraform_io: ${{ secrets.TF_TOKEN_app_terraform_io }}
  AWS_ACCESS_KEY_ID: test
  AWS_SECRET_ACCESS_KEY: test
  AWS_DEFAULT_REGION: ap-southeast-3
  TFC_ORG: ExperimentTerraform
  BACKEND: local

jobs:
  static-analysis:
    name: Static analysis (tflint + checkov)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.5.7"
          terraform_wrapper: false

      - name: Sync live stacks (local backend)
        run: |
          chmod +x scripts/*.sh
          BACKEND=local ./scripts/sync-live.sh

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: v0.50.3

      - name: TFLint
        run: |
          tflint --init
          failed=0
          for dir in terraform/modules/*; do
            [ -d "$dir" ] || continue
            # Docs-only snippet directory (no real Terraform root module)
            [ "$(basename "$dir")" = "_provider" ] && continue
            echo "==> tflint $dir"
            if ! tflint --chdir="$dir" --format compact --config "$PWD/.tflint.hcl"; then
              failed=1
            fi
          done
          # Live stacks are generated; report but do not fail the job on unused shared vars noise
          for dir in terraform/live/staging/*; do
            [ -d "$dir" ] || continue
            echo "==> tflint $dir (informational)"
            tflint --chdir="$dir" --format compact --config "$PWD/.tflint.hcl" || true
          done
          exit "$failed"

      - name: Checkov
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: terraform/modules
          framework: terraform
          soft_fail: true
          skip_check: CKV_AWS_144,CKV_AWS_18,CKV_AWS_21,CKV2_AWS_6,CKV_AWS_145,CKV_AWS_19,CKV_AWS_26,CKV_AWS_27,CKV_AWS_7

  terraform:
    name: Terraform (${{ github.event.inputs.environment || 'staging' }})
    needs: static-analysis
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Require TFC token when BACKEND=cloud
        run: |
          if [ "${BACKEND}" = "cloud" ] && [ -z "${TF_TOKEN_app_terraform_io}" ]; then
            echo "::error::BACKEND=cloud requires repository secret TF_TOKEN_app_terraform_io."
            exit 1
          fi

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: "v1.29.14"

      - name: Start Kind + LocalStack
        run: |
          chmod +x scripts/*.sh
          ./scripts/up.sh
          curl -sf http://localhost:4566/_localstack/health | tee /tmp/ls-health.json
          echo
          echo "LocalStack is healthy (bound to job network only; not published to the internet)."
          kind get clusters
          kubectl --kubeconfig .kube/kind-config get nodes

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.5.7"
          terraform_wrapper: false

      - name: Resolve environment & action
        id: meta
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "environment=${{ github.event.inputs.environment }}" >> "$GITHUB_OUTPUT"
            echo "action=${{ github.event.inputs.action }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "environment=staging" >> "$GITHUB_OUTPUT"
            echo "action=plan" >> "$GITHUB_OUTPUT"
          else
            echo "environment=staging" >> "$GITHUB_OUTPUT"
            echo "action=apply" >> "$GITHUB_OUTPUT"
          fi

      - name: Terraform ${{ steps.meta.outputs.action }}
        run: |
          chmod +x scripts/*.sh
          ./scripts/env.sh "${{ steps.meta.outputs.environment }}" "${{ steps.meta.outputs.action }}"

      - name: Stop Kind + LocalStack
        if: always()
        run: |
          docker compose down -v || true
          ./scripts/kind-down.sh || true
