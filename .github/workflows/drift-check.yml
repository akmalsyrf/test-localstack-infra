name: Drift check (scheduled)

# Independent cadence re-validation of "0 drift after fresh apply".
#
# Limitation (documented in docs/ARCHITECTURE.md): CI runners and LocalStack are
# ephemeral — there is no multi-day infra to compare between jobs. This workflow:
#   1) LocalStack alone (Kind deferred — same sequencing as terraform.yml)
#   2) bootstrap BACKEND=s3 + apply shared/network/backend while host :4566 works
#   3) Kind, then apply eks (env.sh rewrites S3 backend endpoints if Kind attach
#      breaks localhost publish on Linux)
#   4) scripts/checks/check-drift.sh
# It cannot detect real out-of-band changes against a long-lived LocalStack —
# that would need a persistent LocalStack instance or real AWS.
# Notifications: rely on GitHub workflow-failure emails to repo watchers.

on:
  schedule:
    - cron: "0 3 * * *" # daily 03:00 UTC
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        type: choice
        options:
          - staging
          - production
          - dev
        default: staging

concurrency:
  group: drift-check-${{ github.event.inputs.environment || 'staging' }}
  cancel-in-progress: false

env:
  AWS_ACCESS_KEY_ID: test
  AWS_SECRET_ACCESS_KEY: test
  AWS_DEFAULT_REGION: ap-southeast-3
  AWS_EC2_METADATA_DISABLED: "true"
  BACKEND: s3
  LAMBDA_RUNTIME_EXECUTOR: docker

jobs:
  drift:
    name: Drift check (${{ github.event.inputs.environment || 'staging' }})
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: "v1.29.14"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.5.7"
          terraform_wrapper: false

      - name: Resolve environment
        id: meta
        run: |
          echo "environment=${{ github.event.inputs.environment || 'staging' }}" >> "$GITHUB_OUTPUT"

      - name: Start LocalStack (no Kind yet)
        timeout-minutes: 5
        run: |
          chmod +x scripts/*/*.sh
          # Match terraform.yml: keep host :4566 healthy for S3 backend bootstrap
          # and early stacks. Kind attach on Linux CI breaks published :4566.
          SKIP_KIND=1 ./scripts/lifecycle/up.sh
          curl -sf http://localhost:4566/_localstack/health

      - name: Bootstrap S3 backend
        run: |
          chmod +x scripts/*/*.sh
          ./scripts/backend/use-s3-backend.sh "${{ steps.meta.outputs.environment }}"

      - name: Apply shared, network, backend
        timeout-minutes: 25
        run: |
          chmod +x scripts/*/*.sh
          ./scripts/lifecycle/env.sh "${{ steps.meta.outputs.environment }}" apply shared,network,backend

      - name: Start Kind (before eks only)
        timeout-minutes: 15
        run: |
          chmod +x scripts/*/*.sh
          ./scripts/kind/kind-up.sh
          # Do NOT docker-network-connect LocalStack here (breaks host :4566).
          # env.sh / localstack-network-info.sh handle attach before eks apply.
          if ! curl -sf --max-time 3 http://localhost:4566/_localstack/health >/dev/null; then
            echo "LocalStack unreachable after Kind create — docker compose up -d (no recreate)..."
            docker compose up -d --no-recreate
          fi
          for i in $(seq 1 60); do
            if curl -sf --max-time 3 http://localhost:4566/_localstack/health >/dev/null; then
              echo "LocalStack healthy (host :4566)."
              break
            fi
            if [[ "$i" -eq 60 ]]; then
              echo "::error::LocalStack did not recover after Kind start"
              docker compose ps || true
              docker compose logs --tail=80 || true
              exit 1
            fi
            sleep 2
          done
          kind get clusters
          kubectl --kubeconfig .kube/kind-config get nodes

      - name: Apply eks
        timeout-minutes: 25
        run: |
          chmod +x scripts/*/*.sh
          ./scripts/lifecycle/env.sh "${{ steps.meta.outputs.environment }}" apply eks

      - name: Drift check
        timeout-minutes: 15
        run: |
          chmod +x scripts/*/*.sh
          ./scripts/checks/check-drift.sh "${{ steps.meta.outputs.environment }}"

      - name: Stop Kind + LocalStack
        if: always()
        timeout-minutes: 5
        run: |
          docker compose down -v || true
          ./scripts/kind/kind-down.sh || true
