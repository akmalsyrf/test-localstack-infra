# Optional local-dev observability: Grafana OSS + Loki OSS + Promtail OSS.
# NOT started by scripts/up.sh or CI — use ./scripts/observability-up.sh.
#
# Ports: Grafana :3000, Loki :3100 (Kind NodePorts are 30080/30081/30082).
# Resource note: this stack is CPU/RAM heavy — avoid on constrained machines
# alongside heavy Kind+LocalStack+apply workloads.

services:
  loki:
    image: grafana/loki:3.4.2
    container_name: testinfra-loki
    command: ["-config.file=/etc/loki/local-config.yaml"]
    volumes:
      - ./observability/loki/loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki-data:/loki
    ports:
      - "3100:3100"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3100/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 15s

  promtail:
    image: grafana/promtail:3.4.2
    container_name: testinfra-promtail
    command: ["-config.file=/etc/promtail/config.yml"]
    volumes:
      - ./observability/promtail/promtail-config.yml:/etc/promtail/config.yml:ro
      # docker_sd via sock works on Docker Desktop Mac + Linux; host /var/log/pods
      # is often absent on Mac and would break compose up if mounted.
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      loki:
        condition: service_healthy

  grafana:
    image: grafana/grafana-oss:11.5.2
    container_name: testinfra-grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_AUTH_ANONYMOUS_ENABLED=false
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      loki:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

volumes:
  loki-data:
  grafana-data:
