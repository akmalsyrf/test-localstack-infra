server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  # Kind nodes + LocalStack run as Docker containers — docker_sd works on Mac
  # Docker Desktop and Linux without needing /var/log/pods on the host.
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 10s
    relabel_configs:
      - source_labels: ["__meta_docker_container_name"]
        regex: "/(.*)"
        target_label: container
      - source_labels: ["__meta_docker_container_log_stream"]
        target_label: stream
      # Keep Kind / LocalStack / sample workload related containers.
      - source_labels: ["__meta_docker_container_name"]
        regex: ".*(testinfra|kind|k8s_).*"
        action: keep
