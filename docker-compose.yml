services:
  localstack:
    image: localstack/localstack:4.3
    container_name: testinfra-localstack
    ports:
      - "4566:4566"
    environment:
      # EKS API is LocalStack Pro-only; Kind is the free-tier control-plane stand-in.
      # dynamodb: S3 backend state locking (BACKEND=s3). xray: Lambda Active tracing.
      - SERVICES=s3,iam,sts,ec2,lambda,apigateway,sqs,sns,logs,secretsmanager,ssm,cloudwatch,dynamodb,xray
      - DEBUG=0
      - PERSISTENCE=0
      # Legacy path URLs (http://localhost:4566/000000000000/queue) — AWS Terraform
      # provider rejects LocalStack "path" strategy (/queue/<region>/...).
      - SQS_ENDPOINT_STRATEGY=off
      - DISABLE_CORS_CHECKS=1
      - LOCALSTACK_HOST=localhost
      - LAMBDA_RUNTIME_EXECUTOR=docker
      # Docker executor is required for Lambda invoke smoke tests in this repo.
      # It shares the host Docker daemon with Kind (DinD); CI therefore starts
      # Kind only before the eks stack — see .github/workflows/terraform.yml and
      - LAMBDA_RUNTIME_ENVIRONMENT_TIMEOUT=60
      - DOCKER_HOST=unix:///var/run/docker.sock
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - localstack-data:/var/lib/localstack
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_localstack/health"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 10s

volumes:
  localstack-data:
